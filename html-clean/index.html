<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Storage: Photo Cleaner</title>
    <style>
        :root {
            /* 主题颜色 */
            --bg-start: #5F51E6;
            --bg-end: #100A20;
            --primary-accent: #893EB3;
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 动态深色渐变背景 */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 采用指定的 #5F51E6 和 #100A20 */
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end), var(--bg-start));
            background-size: 200% 200%;
            animation: gradientFlow 10s ease infinite;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 玻璃拟态容器 */
        .main-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* App Icon 展示 */
        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(95, 81, 230, 0.3);
            margin-bottom: 25px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 12px;
            font-weight: 800;
        }

        .desc {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 邮箱复制区 */
        .email-box {
            background: #f4f3ff;
            border: 1px solid #e0deff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .email-box:hover {
            background: #eeecff;
            transform: translateY(-2px);
        }

        .email-text {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: var(--bg-start);
        }

        .copy-hint {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 5px;
        }

        /* 新增 Contact Us 按钮 */
        .btn-contact {
            display: block;
            background: linear-gradient(90deg, #5F51E6, #893EB3);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(95, 81, 230, 0.2);
        }

        .btn-contact:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(95, 81, 230, 0.4);
            filter: brightness(1.1);
        }

        /* 复制成功的轻量提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 13px;
            display: none;
            z-index: 100;
        }

        footer {
            margin-top: 30px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="logo.png" alt="Clean Storage Icon" class="app-icon">
        
        <h1>CleanGo Pro</h1>
        
        <p class="desc">
            If you have any questions, complaints or claims with respect to our Services, you may contact us at the address below.
        </p>

        <div class="email-box" onclick="copyToClipboard()">
            <span class="email-text" id="email-val">yuvison_contactus@yeah.net</span>
            <span class="copy-hint">Click to copy email address</span>
        </div>

        <a href="mailto:yuvison_contactus@yeah.net" class="btn-contact">
            Contact Us
        </a>

        <footer>
            &copy; 2026 YuVision Team. All rights reserved.
        </footer>
    </div>

    <div id="toast" class="toast">Email Copied!</div>

    <script>
        function copyToClipboard() {
            const email = document.getElementById('email-val').innerText;
            const toast = document.getElementById('toast');
            
            navigator.clipboard.writeText(email).then(() => {
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
